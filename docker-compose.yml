services:
  postgres:
    image: postgres:16-alpine
    container_name: argos_postgres
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: argos
      POSTGRES_PASSWORD: argos
      POSTGRES_DB: argos
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U argos']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: argos_redis
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  mailhog:
    image: mailhog/mailhog:latest
    container_name: argos_mailhog
    ports:
      - '1025:1025' # SMTP
      - '8025:8025' # Web UI
    restart: unless-stopped

  server:
    build:
      context: ./server
      dockerfile: Dockerfile.dev
    container_name: argos_server
    ports:
      - '4000:4000'
    volumes:
      - ./server:/app
      - /app/node_modules
      - server_uploads:/app/uploads
    env_file:
      - .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mailhog:
        condition: service_started
    restart: unless-stopped

  client:
    build:
      context: ./client
      dockerfile: Dockerfile.dev
    container_name: argos_client
    ports:
      - '3000:3000'
    volumes:
      - ./client:/app
      - /app/node_modules
    environment:
      - VITE_API_BASE_URL=http://localhost:4000/api/v1
    depends_on:
      - server
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  server_uploads:
